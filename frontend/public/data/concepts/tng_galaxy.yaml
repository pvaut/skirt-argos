dashboardTemplate:
  targetConcept: tng_galaxy
  templateId: autoTemplate_concept_Gf196697a_85f8_49a6_8459_f0cafc36c8da.yaml
  name: Template for TNG Galaxies
  rootElement:
    elements:
      - type: verticalGroup
        elements:
          - type: horizontalGroup
            elements:
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePointsVelocity
                    encodings:
                      position: Coordinates
                      velocity: Velocities
                    table: $PartType0
                    settings:
                      velocityVectorSize: 0
                      velocityVectorOpacity: 0
                      pointSizeFactor: 1.2
                settings:
                  syncGroupVolume: vol
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePointsVelocity
                    encodings:
                      position: Coordinates
                      velocity: Velocities
                    table: $PartType4
                    settings:
                      velocityVectorSize: 0
                      velocityVectorOpacity: 0
                      pointSizeFactor: 1.2
                settings:
                  syncGroupVolume: vol
            size:
              width: 100%
            settings: {}
        size:
          width: 100%
        settings:
          title: Kinematics
      - type: verticalGroup
        elements:
          - type: horizontalGroup
            elements:
              - type: canvasVolume
                size:
                  width: 100%
                  height: 600px
                layers:
                  - type: volumePoints
                    encodings:
                      position: Coordinates
                      color: log_Density
                      size: log_Density
                    table: $PartType0
                    settings:
                      sizeGammaFactor: 0.5
                      colorRamp: default
                      scaleOpacityWithSize: true
                      pointSizeFactor: 4.6
                settings:
                  syncGroupVolume: vol
                  title: Gas Density
              - type: canvasVolume
                size:
                  width: 100%
                  height: 600px
                layers:
                  - type: volumePoints
                    encodings:
                      position: Coordinates
                      color: GFM_Metallicity
                      size: GFM_Metallicity
                    table: $PartType0
                    settings:
                      colorRamp: defaultToBlack
                      colorGammaFactor: 0.31
                      sizeGammaFactor: 0.45
                      pointSizeFactor: 6.8
                settings:
                  syncGroupVolume: vol
                  title: Gas Metallicity
            size:
              width: 100%
            settings: {}
          - type: horizontalGroup
            elements:
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePoints
                    encodings:
                      position: Coordinates
                      color: StarFormationRate
                      size: StarFormationRate
                    table: $PartType0
                    settings:
                      colorGammaFactor: 0.19
                      colorRamp: magma
                      scaleOpacityWithSize: true
                      sizeGammaFactor: 0.23
                      colorRangeMin: 0.04
                      colorRangeMax: 0.71
                      pointSizeFactor: 6
                settings:
                  syncGroupVolume: vol
                  title: Star Formation Rate
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePointsVelocity
                    encodings:
                      position: Coordinates
                      velocity: MagneticField
                    table: $PartType0
                    settings:
                      pointSizeFactor: 0
                      velocityVectorSize: 2
                      velocityVectorOpacity: 0.5
                settings:
                  syncGroupVolume: vol
                  title: Magnetic field
            size:
              width: 100%
            settings: {}
          - type: horizontalGroup
            elements:
              - type: canvas2D
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: points
                    encodings:
                      x: log_Density
                      'y': ElectronAbundance
                      color: GFM_Metallicity
                    table: $PartType0
                    settings:
                      pointSizeFactor: 1.6
                      colorGammaFactor: 0.32
              - type: canvas2D
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: points
                    encodings:
                      x: GFM_Metallicity
                      'y': StarFormationRate
                      color: Potential
                    table: $PartType0
                    settings:
                      pointSizeFactor: 1.8
            size:
              width: 100%
            settings: {}
        size:
          width: 100%
        settings:
          title: Gas
      - type: verticalGroup
        elements:
          - type: horizontalGroup
            elements:
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePoints
                    encodings:
                      position: Coordinates
                      color: log_GFM_Metallicity
                      size: log_GFM_Metallicity
                    table: $PartType4
                    settings:
                      colorRamp: default
                      colorGammaFactor: 0.52
                      pointSizeFactor: 3.8
                      scaleOpacityWithSize: false
                      colorRangeMax: 0.86
                      colorRangeMin: 0.11
                settings:
                  syncGroupVolume: vol
              - type: canvasVolume
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: volumePoints
                    encodings:
                      position: Coordinates
                      color: GFM_StellarFormationTime
                    table: $PartType4
                    settings:
                      colorRamp: rainbow
                      pointSizeFactor: 4
                      colorGammaFactor: 0.91
                settings:
                  syncGroupVolume: vol
            size:
              width: 100%
            settings: {}
          - type: horizontalGroup
            elements:
              - type: canvas2D
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: points
                    encodings:
                      x: GFM_StellarFormationTime
                      'y': GFM_Metallicity
                      color: Potential
                    table: $PartType4
                    settings:
                      pointSizeFactor: 1
              - type: canvas2D
                size:
                  height: 600px
                  width: 100%
                layers:
                  - type: points
                    encodings:
                      x: GFM_Metallicity
                      'y': Potential
                      color: GFM_StellarFormationTime
                    table: $PartType4
                    settings:
                      pointSizeFactor: 1.2
                      colorRamp: rainbow
                      colorGammaFactor: 0.9
            size:
              width: 100%
            settings: {}
        size:
          width: 100%
        settings:
          title: Stars
    type: verticalGroup
  computationRecipes:
    $PartType0:
