    name: Velocity

  - id: SubhaloVel_I_0
    type: float
    name: X velocity
    parent: Velocity
    decimal_digits: 2

  - id: SubhaloVel_I_1
    type: float
    name: Y velocity
    parent: Velocity
    decimal_digits: 2

  - id: SubhaloVel_I_2
    type: float
    name: Z velocity
    parent: Velocity
    decimal_digits: 2


  - id: SubhaloVelDisp
    type: float
    name: Velocity dispsersion
    decimal_digits: 2

  - id: SubhaloLen
    type: float
