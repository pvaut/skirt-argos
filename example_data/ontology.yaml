- id: survey
  name: Survey table
  name_plural: Survey tables
  description: A galaxy survey


- id: galaxy
  name: Galaxy
  name_plural: Galaxies
  description: Galaxy
  label_property: objname
  properties:
  - id: pgc
    type: int
    name: PGC number
  - id: objname
    type: string
    name: Principal name
  - id: al2000
    type: double
    unit: hour
    name: RA 2000
    decimal_digits: 5
  - id: de2000
    type: double
    unit: degrees
    name: DEC 2000 
    decimal_digits: 3
  - id: type
    type: categorical
    name: Morphological type
  - id: logd25
    type: float
    unit: log(0.1 arcmin)
    name: log of apparent diameter
    decimal_digits: 3
  - id: e_logd25
    type: float
    unit: log(0.1 arcmin)
    name: Actual error on logd25
    decimal_digits: 3
  - id: logr25
    type: float
    unit: log
    name: log of axis ratio
    decimal_digits: 3
  - id: e_logr25
    type: float
    unit: log
    name: Actual error on logr25
    decimal_digits: 3
  - id: brief
    type: float
    unit: mag/arcsec2
    name: Mean effective surface brightness
    decimal_digits: 3
  - id: bt
    type: float
    unit: mag
    name: Total B-magnitude
    decimal_digits: 3
  - id: e_bt
    type: float
    unit: mag
    name: Error on Total B-magnitude
    decimal_digits: 3
  - id: it
    type: float
    unit: mag
    name: Total I-magnitude
    decimal_digits: 3
  - id: e_it
    type: float
    unit: mag
    name: Error on Total I-magnitude
    decimal_digits: 3
  - id: vdis
    type: float
    unit: km/s
    name: Central velocity dispersion
    decimal_digits: 5
  - id: e_vdis
    type: float
    unit: km/s
    name: Error on Central velocity dispersion
    decimal_digits: 5


